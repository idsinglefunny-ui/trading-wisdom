<h2>网站应该包含哪些内容？</h2>
<p class="subtitle">请选择你希望网站包含的模块</p>

<div class="options" data-multiselect>
  <div class="option" data-choice="landing" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>落地页</h3>
      <p>展示应用介绍、功能特色、下载链接</p>
    </div>
  </div>
  <div class="option" data-choice="browse" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>语录浏览</h3>
      <p>公开浏览精选交易语录，可按分类筛选</p>
    </div>
  </div>
  <div class="option" data-choice="admin" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>管理后台</h3>
      <p>管理语录（增删改查），你已经提到需要这个</p>
    </div>
  </div>
  <div class="option" data-choice="about" onclick="toggleSelect(this)">
    <div class="letter">D</div>
    <div class="content">
      <h3>关于页面</h3>
      <p>项目介绍、联系方式、版权信息</p>
    </div>
  </div>
</div>

<div class="section">
  <p class="label">当前 App 主题色参考</p>
  <div style="display:flex;gap:12px;flex-wrap:wrap;">
    <div style="display:flex;align-items:center;gap:8px;">
      <div style="width:32px;height:32px;border-radius:6px;background:#3B82F6;border:1px solid #475569;"></div>
      <span style="font-size:14px;">专业深色（默认）</span>
    </div>
    <div style="display:flex;align-items:center;gap:8px;">
      <div style="width:32px;height:32px;border-radius:6px;background:#14B8A6;border:1px solid #475569;"></div>
      <span style="font-size:14px;">温馨鼓励</span>
    </div>
    <div style="display:flex;align-items:center;gap:8px;">
      <div style="width:32px;height:32px;border-radius:6px;background:#0369A1;border:1px solid #475569;"></div>
      <span style="font-size:14px;">极简浅色</span>
    </div>
  </div>
</div>
